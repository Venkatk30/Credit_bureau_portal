<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Processing - Credit Bureau Portal</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f') no-repeat center/cover;
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    z-index: -1;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.6);
}

.login-btn {
    padding: 6px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
}

.avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
}

.main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: calc(100vh - 70px);
    padding: 40px;
}

.info {
    max-width: 500px;
}

.floating-text {
    margin-top: 20px;
    color: #d1d5db;
    font-size: 14px;
    animation: floatText 4s ease-in-out infinite alternate;
}

@keyframes floatText {
    0% { transform: translateY(0px); opacity: 0.8; }
    100% { transform: translateY(-10px); opacity: 1; }
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 35px;
    border-radius: 14px;
    width: 420px;
    font-size: 16px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    font-size: 15px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 12px;
    background: #0078D4;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.result {
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="header">
<h3>Loan Processing | Credit Bureau Portal</h3>
<div class="login-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="avatar">
    Bot
</div>
</div>

<div class="main">

<div>
<h2>Automated Credit Check</h2>
<p>Enter details to fetch credit score.</p>
</div>

<div class="container">
<label>Loan ID *</label>
<input type="text" id="loanId">

<label>Applicant Name *</label>
<input type="text" id="name">

<label>SSN Number *</label>
<input type="text" id="ssn">

<button onclick="getScore()">Fetch</button>

<div id="result" class="result"></div>
</div>

</div>

<script>
function getScore(){
    let loanId = document.getElementById("loanId").value.trim();
    let name = document.getElementById("name").value.trim();
    let ssn = document.getElementById("ssn").value.trim();

    if(!loanId || !name || !ssn){
        document.getElementById("result").innerHTML = "All fields are required";
        return;
    }

    let data = {
        "LN003": { name: "David Miller", ssn: "789456123", score: 750, risk: "Low" },
        "LN001": { name: "John Carter", ssn: "456321987", score: 580, risk: "High" },
        "LN002": { name: "Maria Lopez", ssn: "987654123", score: 690, risk: "Medium" },
		"LN004": { name: "Sarah Lee", ssn: "321654987", score: 610, risk: "Medium" },
		"LN0010": { name: "Gaurav Sharma", ssn: "HBXYH5454Z", score: 750, risk: "Low" },
        "LN0012": { name: "Nikhil Kannan", ssn: "HFYPK4366B", score: 580, risk: "High" },
        "LN0013": { name: "Akash Sharma", ssn: "KVYEQ5555E", score: 690, risk: "Medium" },
		"LN009": { name: "Venkat Kusuma", ssn: "985455689", score: 690, risk: "Medium" }
    };

    let res = data[loanId];

    if(!res){
        document.getElementById("result").innerHTML = "Record not found for given Loan ID";
        return;
    }

    if(res.name.toLowerCase() !== name.toLowerCase()){
        document.getElementById("result").innerHTML = "Applicant name mismatch";
        return;
    }

    if(res.ssn.toLowerCase() !== ssn.toLowerCase()){
        document.getElementById("result").innerHTML = "Invalid SSN Number";
        return;
    }

    document.getElementById("result").innerHTML =
        "Credit Score: " + res.score + "<br>Risk: " + res.risk;
}
</script>

</body>
</html>
